name: Docker Publish

on:
  push:
    branches: [master, main]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u awkwindccy --password-stdin

      - name: Build image
        run: docker build -t awkwindccy/omniagent:latest .

      - name: Push image
        run: docker push awkwindccy/omniagent:latest
